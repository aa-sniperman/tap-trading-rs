version: '3.9'
services:
  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
      - -c
      - max_slot_wal_keep_size=4096
      - -c
      - wal_sender_timeout=60s
    environment:
      POSTGRES_DB: tap_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/00-replication-setup.sql:/docker-entrypoint-initdb.d/00-replication-setup.sql:ro

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
      - "8001:8001"

  redis-software:
    image: redislabs/redis
    profiles: ["redis-software"]
    cap_add:
      - sys_resource
    ports:
      - "8443:8443"
      - "9443:9443"
      - "12000:12000"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: tap_trading
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  postgres_data:
  clickhouse_data:
